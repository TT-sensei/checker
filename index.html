<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学習トラッカー</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Nunito:wght@700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Zen Kaku Gothic New',sans-serif;
margin:0;
background:#fafaf7;
}

header{
background:#166534;
color:white;
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
border:none;
border-radius:8px;
padding:6px 10px;
cursor:pointer;
}

.tabs{
display:flex;
gap:4px;
padding:6px;
background:#166534;
}

.tab{
background:#1f7a45;
color:white;
}

.tab.active{
background:white;
color:black;
}

.container{
padding:12px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:6px;
text-align:center;
}

tr.dragging{
opacity:.5;
}

.chk{
cursor:pointer;
font-size:18px;
}

.rank{
background:#f0fdf4;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<header>
<h1>学習トラッカー</h1>

<div>
<button onclick="toggleFilter()">未チェック</button>
<button onclick="showRanking()">ランキング</button>
<button onclick="openAddTab()">＋タブ</button>
</div>

</header>

<div class="tabs" id="tabs"></div>

<div class="container">

<div id="ranking" class="rank hidden"></div>

<table id="table"></table>

</div>

<div id="modal" class="hidden"></div>

<script>

let state={
tabs:[],
activeId:null
}

let showUnchecked=false

function today(){
return new Date().toISOString().slice(0,10)
}

function save(){
localStorage.setItem("tracker",JSON.stringify(state))
}

function load(){
const d=localStorage.getItem("tracker")
if(d) state=JSON.parse(d)
}

function activeTab(){
return state.tabs.find(t=>t.id===state.activeId)
}

function addTab(name,count){

const tab={
id:Date.now().toString(),
name:name,
count:count,
labels:{},
records:{}
}

state.tabs.push(tab)
state.activeId=tab.id
save()
render()
}

function renderTabs(){

const el=document.getElementById("tabs")
el.innerHTML=""

state.tabs.forEach(t=>{

const b=document.createElement("button")
b.className="tab"+(t.id===state.activeId?" active":"")

b.textContent=t.name

b.onclick=()=>{
state.activeId=t.id
render()
}

el.appendChild(b)

})

}

function streak(rec){

let s=0
let d=new Date()

while(true){

const ds=d.toISOString().slice(0,10)

if(rec && rec[ds]){

s++
d.setDate(d.getDate()-1)

}else{
break
}

}

return s
}

function renderTable(){

const tab=activeTab()
if(!tab) return

const tb=document.getElementById("table")

let html="<tr><th>#</th><th>名前</th><th>今日</th><th>連続</th></tr>"

for(let i=1;i<=tab.count;i++){

const rec=tab.records[i]||{}
const td=today()
const checked=rec[td]

if(showUnchecked && checked) continue

html+=`
<tr draggable="true" data-id="${i}">
<td>${i}</td>
<td contenteditable oninput="rename(${i},this.innerText)">${tab.labels[i]||""}</td>
<td class="chk" onclick="toggle(${i})">${checked?"○":""}</td>
<td>${streak(rec)}</td>
</tr>
`

}

tb.innerHTML=html

dragInit()

}

function rename(i,name){

const tab=activeTab()
tab.labels[i]=name
save()

}

function toggle(i){

const tab=activeTab()
const td=today()

if(!tab.records[i]) tab.records[i]={}

tab.records[i][td]=!tab.records[i][td]

save()
render()

}

function toggleFilter(){

showUnchecked=!showUnchecked
render()

}

function showRanking(){

const tab=activeTab()
const el=document.getElementById("ranking")

let arr=[]

for(let i=1;i<=tab.count;i++){

arr.push({
name:tab.labels[i]||("No."+i),
s:streak(tab.records[i])
})

}

arr.sort((a,b)=>b.s-a.s)

let html="<b>連続ランキング</b><br><br>"

arr.slice(0,10).forEach((p,i)=>{
html+=`${i+1}位 ${p.name} (${p.s})<br>`
})

el.innerHTML=html
el.classList.toggle("hidden")

}

function openAddTab(){

const m=document.getElementById("modal")

m.classList.remove("hidden")

m.innerHTML=`
<div style="background:white;padding:20px;max-width:300px;margin:100px auto;border-radius:12px">

<h3>タブ追加</h3>

<input id="tn" placeholder="名前"><br><br>
<input id="tc" type="number" value="35"><br><br>

<button onclick="createTab()">作成</button>
<button onclick="closeModal()">閉じる</button>

</div>
`

}

function closeModal(){
document.getElementById("modal").classList.add("hidden")
}

function createTab(){

const name=document.getElementById("tn").value
const count=parseInt(document.getElementById("tc").value)

addTab(name,count)
closeModal()

}

function dragInit(){

let drag

document.querySelectorAll("tr[draggable]").forEach(row=>{

row.addEventListener("dragstart",()=>{
drag=row
row.classList.add("dragging")
})

row.addEventListener("dragend",()=>{
row.classList.remove("dragging")
})

row.addEventListener("dragover",e=>{
e.preventDefault()

const parent=row.parentNode

if(drag!==row){

parent.insertBefore(drag,row)

}

})

})

}

function render(){

renderTabs()
renderTable()

}

load()

if(state.tabs.length===0){

addTab("宿題",35)
addTab("計算ドリル",35)
addTab("音読",35)

}

render()

</script>

</body>
</html>
