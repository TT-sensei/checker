<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学習トラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Nunito:wght@700;800&display=swap" rel="stylesheet">

<style>
/* 元CSSそのまま */
:root {
--g50:#f0fdf4; --g100:#dcfce7; --g400:#4ade80;
--g500:#22c55e; --g600:#16a34a; --g700:#15803d; --g800:#166534;
--o100:#fff7ed; --o400:#fb923c; --o500:#f97316;
--s100:#e8f0e9; --s200:#c9d9cb; --s300:#a0b8a3;
--cream:#fafaf7; --gray:#6b7280; --dark:#1a2e1c;
--sh-sm:0 1px 3px rgba(22,101,52,.08);
--sh-md:0 4px 14px rgba(22,101,52,.15);
--r:14px; --rs:8px;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Zen Kaku Gothic New',sans-serif;
background:var(--cream);
color:var(--dark);
}

.hdr{
background:var(--g800);
color:#fff;
padding:13px 18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.tabs{
background:var(--g800);
padding:0 10px;
display:flex;
gap:4px;
overflow-x:auto;
}

.tab{
background:rgba(255,255,255,.12);
border:none;
color:#fff;
border-radius:9px 9px 0 0;
padding:7px 13px;
cursor:pointer;
}

.tab.active{
background:var(--cream);
color:var(--g800);
font-weight:700;
}

.main{
padding:18px;
max-width:780px;
margin:auto;
}

.prog-row{
display:flex;
align-items:center;
gap:10px;
margin-bottom:14px;
}

.prog-wrap{
flex:1;
background:var(--s100);
border-radius:6px;
height:7px;
overflow:hidden;
}

.prog-bar{
background:linear-gradient(90deg,var(--g500),var(--g400));
height:100%;
}

.prog-txt{
font-size:.75rem;
color:var(--gray);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(72px,1fr));
gap:7px;
margin-bottom:16px;
}

.tile{
aspect-ratio:1;
border-radius:var(--rs);
background:#fff;
border:2px solid var(--s200);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
position:relative;
}

.tile.done-today{
background:var(--g500);
border-color:var(--g600);
}

.tile .t-num{
font-family:'Nunito';
font-weight:800;
font-size:1.1rem;
}

.tile .t-name{
font-size:.55rem;
color:var(--gray);
}

.tile .t-streak{
font-size:.58rem;
font-weight:700;
}

.actions{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.btn{
border:none;
border-radius:var(--rs);
padding:8px 14px;
cursor:pointer;
}

.btn-danger{
background:#fef2f2;
border:2px solid #fecaca;
color:#ef4444;
}

</style>
</head>

<body>

<div class="hdr">
<h1>📚 学習トラッカー</h1>
</div>

<div class="tabs" id="tabsEl"></div>

<div class="main" id="mainEl"></div>

<script>

let state={tabs:[],activeId:null}

function save(){
localStorage.setItem("tracker-v4",JSON.stringify(state))
}

function load(){
const d=localStorage.getItem("tracker-v4")
if(d) state=JSON.parse(d)
}

function today(){
return new Date().toISOString().slice(0,10)
}

function getActive(){
return state.tabs.find(t=>t.id===state.activeId)
}

function streak(rec,td){

let c=0
let d=new Date(td)

if(!rec[td]) d.setDate(d.getDate()-1)

while(true){

const ds=d.toISOString().slice(0,10)

if(rec[ds]){
c++
d.setDate(d.getDate()-1)
}else{
break
}

}

return c

}

function renderTabs(){

const el=document.getElementById("tabsEl")

el.innerHTML=""

state.tabs.forEach(t=>{

const b=document.createElement("button")

b.className="tab"+(t.id===state.activeId?" active":"")

b.textContent=t.name

b.onclick=()=>{
state.activeId=t.id
render()
}

el.appendChild(b)

})

}

function renderMain(){

const tab=getActive()

if(!tab) return

const td=today()

const total=tab.count

let doneToday=0

let tiles=[]

for(let i=1;i<=total;i++){

const rec=tab.records[i]||{}
const done=!!rec[td]

if(done) doneToday++

tiles.push({
num:i,
rec:rec,
done:done,
label:tab.labels[i]||"",
streak:streak(rec,td)
})

}

tiles.sort((a,b)=>{

if(a.done===b.done) return a.num-b.num

return a.done?1:-1

})

let tilesHtml=""

tiles.forEach(t=>{

let cls="tile"

if(t.done) cls+=" done-today"

tilesHtml+=`
<div class="${cls}"
onclick="toggle(${t.num})">

<span class="t-num">${t.num}</span>

${t.label?`<span class="t-name">${t.label}</span>`:""}

<span class="t-streak">${t.streak?`🔥${t.streak}`:""}</span>

</div>
`

})

const pct=total?Math.round(doneToday/total*100):0
const remain=total-doneToday

document.getElementById("mainEl").innerHTML=`

<div class="prog-row">
<div class="prog-wrap">
<div class="prog-bar" style="width:${pct}%"></div>
</div>
<span class="prog-txt">残り ${remain}人</span>
</div>

<div class="grid">
${tilesHtml}
</div>

<div class="actions">

<button class="btn" onclick="checkAll()">全員チェック</button>

<button class="btn btn-danger" onclick="resetToday()">今日リセット</button>

<button class="btn btn-danger" onclick="resetAll()">全リセット</button>

</div>

`

}

function toggle(num){

const tab=getActive()
const td=today()

if(!tab.records[num]) tab.records[num]={}

if(tab.records[num][td])
delete tab.records[num][td]
else
tab.records[num][td]=true

save()
renderMain()

}

function checkAll(){

const tab=getActive()
const td=today()

for(let i=1;i<=tab.count;i++){

if(!tab.records[i]) tab.records[i]={}

tab.records[i][td]=true

}

save()
renderMain()

}

function resetToday(){

const tab=getActive()
const td=today()

Object.values(tab.records).forEach(r=>delete r[td])

save()
renderMain()

}

function resetAll(){

const tab=getActive()

tab.records={}

save()
renderMain()

}

function render(){

renderTabs()
renderMain()

}

load()

if(state.tabs.length===0){

state.tabs.push({
id:"1",
name:"宿題",
count:35,
labels:{},
records:{}
})

state.tabs.push({
id:"2",
name:"音読",
count:35,
labels:{},
records:{}
})

state.activeId="1"

save()

}

render()

</script>

</body>
</html>
