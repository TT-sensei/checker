<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学習トラッカー</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Nunito:wght@700;800&display=swap" rel="stylesheet">

<style>

:root{
--g100:#dcfce7;
--g400:#4ade80;
--g500:#22c55e;
--g600:#16a34a;
--g700:#15803d;
--g800:#166534;

--o100:#fff7ed;
--o400:#fb923c;
--o500:#f97316;

--s100:#e8f0e9;
--s200:#c9d9cb;
--s300:#a0b8a3;

--cream:#fafaf7;
--gray:#6b7280;
--dark:#1a2e1c;

--r:14px;
--rs:8px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'Zen Kaku Gothic New',sans-serif;
background:var(--cream);
color:var(--dark);
}

.hdr{
background:var(--g800);
color:#fff;
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.hdr h1{
font-size:1.1rem;
font-family:'Nunito',sans-serif;
}

.hbtn{
background:rgba(255,255,255,.2);
border:none;
color:#fff;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:.8rem;
}

.tabs{
background:var(--g800);
display:flex;
gap:4px;
padding:0 10px;
}

.tab{
background:rgba(255,255,255,.2);
border:none;
padding:6px 12px;
color:#fff;
cursor:pointer;
border-radius:8px 8px 0 0;
font-size:.8rem;
}

.tab.active{
background:var(--cream);
color:var(--g800);
font-weight:700;
}

.tab-add{
border:2px dashed rgba(255,255,255,.4);
background:none;
color:#fff;
padding:5px 10px;
cursor:pointer;
border-radius:8px 8px 0 0;
}

.main{
max-width:800px;
margin:auto;
padding:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(70px,1fr));
gap:6px;
}

.tile{
background:#fff;
border:2px solid var(--s200);
border-radius:8px;
aspect-ratio:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
}

.tile.done{
background:var(--g500);
color:#fff;
}

.tile.streak{
background:var(--o100);
border-color:var(--o400);
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:flex;
justify-content:center;
align-items:center;
}

.modal{
background:#fff;
padding:20px;
border-radius:12px;
width:300px;
}

.inp{
width:100%;
padding:8px;
border:2px solid var(--s200);
border-radius:6px;
margin-top:4px;
}

.mactions{
margin-top:14px;
display:flex;
justify-content:flex-end;
gap:6px;
}

.mbtn{
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.mbtn-ok{
background:var(--g600);
color:#fff;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:var(--g800);
color:#fff;
padding:8px 14px;
border-radius:20px;
font-size:.8rem;
}

</style>
</head>

<body>

<div class="hdr">
<h1>📚 学習トラッカー</h1>
<div>
<button class="hbtn" id="soundBtn" onclick="toggleSound()">🔔</button>
<button class="hbtn" onclick="exportCSV()">CSV</button>
<button class="hbtn" onclick="exportData()">JSON</button>
<label class="hbtn">読込
<input type="file" style="display:none" onchange="importData(event)">
</label>
</div>
</div>

<div class="tabs" id="tabsEl">
<button class="tab-add" onclick="openAddTab()">＋</button>
</div>

<div class="main" id="mainEl"></div>

<div class="overlay" id="tabOverlay" style="display:none">
<div class="modal" id="tabModal"></div>
</div>

<div class="toast" id="toast" style="display:none"></div>

<script>

let state={
tabs:[],
activeId:null
}

function uid(){
return Date.now().toString(36)+Math.random().toString(36).slice(2,5)
}

function today(){
const d=new Date()
return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0')
}

function save(){
localStorage.setItem("tracker",JSON.stringify(state))
}

function load(){
const d=localStorage.getItem("tracker")
if(d) state=JSON.parse(d)
}

function toast(t){
const el=document.getElementById("toast")
el.innerText=t
el.style.display="block"
setTimeout(()=>el.style.display="none",2000)
}

function getActive(){
return state.tabs.find(t=>t.id===state.activeId)
}

function addTab(name,count){
const tab={
id:uid(),
name,
count,
labels:{},
records:{}
}

state.tabs.push(tab)
state.activeId=tab.id
save()
render()
}

function removeTab(id){
if(!confirm("削除しますか")) return
state.tabs=state.tabs.filter(t=>t.id!==id)
state.activeId=state.tabs[0]?.id||null
save()
render()
}

function renderTabs(){

const el=document.getElementById("tabsEl")

el.querySelectorAll(".tab").forEach(e=>e.remove())

const add=el.querySelector(".tab-add")

state.tabs.forEach(t=>{
const b=document.createElement("button")

b.className="tab"+(t.id===state.activeId?" active":"")

b.innerHTML=t.name+" ✕"

b.onclick=()=>{state.activeId=t.id;save();render()}

b.ondblclick=()=>removeTab(t.id)

el.insertBefore(b,add)
})

}

function renderMain(){

const el=document.getElementById("mainEl")
const tab=getActive()

if(!tab){
el.innerHTML="タブを作ってください"
return
}

let html='<div class="grid">'

for(let i=1;i<=tab.count;i++){

const rec=tab.records[i]||{}
const done=rec[today()]

let cls="tile"
if(done) cls+=" done"

html+=`<div class="${cls}" onclick="toggleTile('${tab.id}',${i})">${i}</div>`
}

html+='</div>'

el.innerHTML=html
}

function toggleTile(tabId,num){

const tab=state.tabs.find(t=>t.id===tabId)

if(!tab.records[num]) tab.records[num]={}

const rec=tab.records[num]

if(rec[today()]) delete rec[today()]
else rec[today()]=true

save()
renderMain()

}

function openAddTab(){

document.getElementById("tabModal").innerHTML=`

<h3>新しいタブ</h3>

<label>名前</label>
<input class="inp" id="tn">

<label>人数</label>
<input class="inp" id="tc" type="number" value="35">

<div class="mactions">

<button class="mbtn" onclick="closeModal()">キャンセル</button>

<button class="mbtn mbtn-ok" onclick="createTab()">作成</button>

</div>
`

document.getElementById("tabOverlay").style.display="flex"
}

function closeModal(){
document.getElementById("tabOverlay").style.display="none"
}

function createTab(){

const name=document.getElementById("tn").value
const count=parseInt(document.getElementById("tc").value)

if(!name){
alert("名前を入力")
return
}

addTab(name,count)
closeModal()

}

function exportData(){

const blob=new Blob([JSON.stringify(state)],{type:"application/json"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="tracker.json"

a.click()

}

function importData(e){

const file=e.target.files[0]

const r=new FileReader()

r.onload=()=>{

state=JSON.parse(r.result)

save()

render()

}

r.readAsText(file)

}

function exportCSV(){

let csv="tab,number,date\n"

state.tabs.forEach(t=>{

for(const n in t.records){

for(const d in t.records[n]){

csv+=`${t.name},${n},${d}\n`

}

}

})

const blob=new Blob([csv],{type:"text/csv"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="tracker.csv"

a.click()

}

let sound=true

function toggleSound(){

sound=!sound

document.getElementById("soundBtn").textContent=sound?"🔔":"🔕"

}

load()
render()

</script>
</body>
</html>
